services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: osim_ui
      POSTGRES_USER: osim_dev
      POSTGRES_PASSWORD: osim_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osim_dev -d osim_ui"]
      interval: 5s
      timeout: 3s
      retries: 10

  firebase-emulator:
    # Offizielles Image -- kein NPM-Install bei jedem Start (vs. node:20-slim).
    image: andreysenov/firebase-tools:latest
    command: >
      firebase emulators:start
      --project osim-dev
      --only auth
      --host 0.0.0.0
    ports:
      - "9099:9099"  # Auth-Emulator
      - "4000:4000"  # Emulator UI
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9099/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    # lokaler Object-Storage-Emulator (GCS-kompatibel über S3-API)
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: osim_dev
      MINIO_ROOT_PASSWORD: osim_dev_password
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data

  # Anwendungs-Services werden später ergänzt:
  # api:
  #   build: .
  #   ports: ["8000:8080"]
  #   environment:
  #     DATABASE_URL: postgresql+asyncpg://osim_dev:osim_dev_password@postgres:5432/osim_ui
  #     FIREBASE_PROJECT_ID: osim-dev
  #     FIREBASE_AUTH_EMULATOR_HOST: firebase-emulator:9099
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     firebase-emulator:
  #       condition: service_healthy
  #
  # portal:
  #   build: portal
  #   ports: ["3000:3000"]
  #   environment:
  #     VITE_API_BASE_URL: http://localhost:8000

volumes:
  pgdata:
  miniodata:
