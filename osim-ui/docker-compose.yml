# osim-ui Phase 1 — voller Dev-Stack
#
# Fuenf Services: postgres + firebase-emulator + minio + api + portal.
# Alle mit Healthchecks; `docker compose up -d` startet alles, in <60s sind
# alle Services healthy.
#
# Build-Context fuer api ist `..` (parent von osim-ui), damit der
# editable-install der osim-engine zur Build-Zeit funktioniert (siehe
# osim-ui/Dockerfile Header-Kommentar).
#
# Ports:
#   * postgres:        5432  (DB)
#   * firebase-emulator: 19099 (auth) + 14000 (UI)  — Host-Ports umgebogen wegen
#       Kollision mit tbx_stzrim-Emulator auf 9099/4000. Container-intern bleibt
#       der Emulator auf 9099/4000 (api-Container spricht ihn so an).
#   * minio:           9000  (S3-API) + 9001 (Console)
#   * api:             8000 -> Container 8080
#   * portal:          3002

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: osim_ui
      POSTGRES_USER: osim_dev
      POSTGRES_PASSWORD: osim_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osim_dev -d osim_ui"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  firebase-emulator:
    image: node:20-slim
    working_dir: /app
    ports:
      - "19099:9099"  # auth REST-API (host 19099 -> container 9099)
      - "14000:4000"  # emulator UI    (host 14000 -> container 4000)
    volumes:
      - ./infra/firebase:/app
    command: >
      sh -c "
        npm install -g firebase-tools@latest &&
        firebase emulators:start --project osim-dev --only auth
      "
    healthcheck:
      # Firebase Auth Emulator REST-Endpoint antwortet mit JSON-Hinweis;
      # ein "OK" reicht uns als Liveness-Signal.
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:9099/', r => process.exit(r.statusCode >= 500 ? 1 : 0)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s   # npm install -g firebase-tools dauert beim ersten Start

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: osim_dev
      MINIO_ROOT_PASSWORD: osim_dev_password
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local 2>/dev/null || curl -fsS http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build:
      # Build-Context = parent (osim-engine + osim-ui nebeneinander).
      context: ..
      dockerfile: osim-ui/Dockerfile
    ports:
      - "8000:8080"
    environment:
      DATABASE_URL: postgresql+psycopg://osim_dev:osim_dev_password@postgres:5432/osim_ui
      FIREBASE_PROJECT_ID: osim-dev
      FIREBASE_AUTH_EMULATOR_HOST: firebase-emulator:9099
      ENVIRONMENT: dev
      CORS_ORIGINS: http://localhost:3002,http://localhost:3000
      STORAGE_BACKEND: minio
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: osim_dev
      MINIO_SECRET_KEY: osim_dev_password
      MINIO_BUCKET: osim-ui-dev
      LOCK_TTL_SECONDS: "60"
      LOCK_MAX_INACTIVITY_SECONDS: "900"
    depends_on:
      postgres:
        condition: service_healthy
      firebase-emulator:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health').read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  portal:
    build: ./portal
    ports:
      - "3002:3002"
    environment:
      # Browser ruft API ueber localhost:8000 (NICHT api:8080 — das ist der
      # Container-interne Hostname; im Browser ist nur localhost erreichbar).
      VITE_API_BASE_URL: http://localhost:8000
      VITE_FIREBASE_API_KEY: demo-api-key-for-emulator
      VITE_FIREBASE_AUTH_DOMAIN: osim-dev.firebaseapp.com
      VITE_FIREBASE_PROJECT_ID: osim-dev
      VITE_USE_FIREBASE_EMULATOR: "true"
      # Welle G23 (2026-05-24): polling-basierter File-Watcher.
      # Auf Docker-Desktop-for-Windows funktionieren native inotify-Events
      # NICHT verlässlich für gemountete Host-Volumes — ohne Polling sieht
      # Vite Datei-Änderungen nicht und HMR triggert nie. 300 ms Intervall
      # ist der Standard-Tradeoff (Performance vs. Latenz).
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    volumes:
      # Welle G23 (2026-05-24): Live-HMR statt stale Container.
      # Host-Source wird ins Container-/app gemountet, anonyme Volumes auf
      # node_modules + .vite + dist verhindern, dass die Host-Versionen
      # (die unter Windows fehlen oder OS-inkompatibel sind) die Container-
      # Versionen überlagern.
      - ./portal:/app
      - /app/node_modules
      - /app/.vite
      - /app/dist
    depends_on:
      - api
    healthcheck:
      # Vite-Dev-Server antwortet auf /. Auf node:22-slim ist `wget` da.
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3002/', r => process.exit(r.statusCode >= 500 ? 1 : 0)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  pgdata:
  miniodata:
