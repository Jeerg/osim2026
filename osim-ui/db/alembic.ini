# Alembic-Konfiguration für osim-ui.
# sqlalchemy.url wird zur Laufzeit aus app.core.config.settings überschrieben
# (siehe db/migrations/env.py).

[alembic]
script_location = %(here)s/migrations
prepend_sys_path = ../
path_separator = os

# Konvention: ISO-Date + slug
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# wird zur Laufzeit aus settings.database_url ueberschrieben.
# Default fungiert nur als Fallback.
sqlalchemy.url = postgresql+asyncpg://osim_dev:osim_dev_password@localhost:5432/osim_ui


[post_write_hooks]
# Auto-format generated migrations
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
